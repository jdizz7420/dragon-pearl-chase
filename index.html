<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Dragon's Pearl Chase</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #7a0d0d;
    font-family: "Comic Sans MS", "Chalkboard", "Trebuchet MS", sans-serif;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #game { display: block; width: 100vw; height: 100vh; background: #b81414; }

  /* ---- Overlay screens ---- */
  .screen {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: 24px; overflow-y: auto;
    background: radial-gradient(circle at 50% 35%, #d41d1d 0%, #8f0f0f 70%, #6b0a0a 100%);
    color: #ffe9a8;
  }
  .hidden { display: none !important; }

  .title {
    font-size: 13vw; line-height: 1.05; font-weight: bold;
    color: #ffd34d;
    text-shadow: 0 3px 0 #7a0d0d, 0 0 18px rgba(255,190,60,.6);
    margin-bottom: 2vh;
  }
  .dragon-emoji { font-size: 20vw; margin-bottom: 1vh; filter: drop-shadow(0 4px 10px rgba(0,0,0,.4)); }
  .subtitle { font-size: 5.5vw; color: #ffe9a8; margin-bottom: 3vh; max-width: 640px; }

  .btn {
    font-family: inherit; font-weight: bold;
    font-size: 7vw; color: #7a0d0d;
    background: linear-gradient(#ffe27a, #ffc42e);
    border: none; border-radius: 999px;
    padding: 3.5vw 12vw;
    box-shadow: 0 6px 0 #b8860b, 0 10px 22px rgba(0,0,0,.35);
    cursor: pointer;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b, 0 6px 14px rgba(0,0,0,.35); }

  /* ---- Dragon picker ---- */
  .pick-label { font-size: 5vw; color: #ffe9a8; margin-bottom: 2.2vh; }
  .picker { display: flex; gap: 6vw; margin-bottom: 3.5vh; }
  .pick-opt { display: flex; flex-direction: column; align-items: center; gap: 1.4vh; }
  .pick-name { font-size: 4.4vw; font-weight: bold; color: #ffe9a8; opacity: .7; }
  .pick.sel + .pick-name { color: #ffd34d; opacity: 1; }
  .pick {
    width: 20vw; height: 20vw; max-width: 108px; max-height: 108px;
    border-radius: 50%; padding: 0; cursor: pointer;
    background: radial-gradient(circle at 35% 30%, #ffffffaa 0%, transparent 42%), var(--c);
    border: 6px solid rgba(0,0,0,.18);
    box-shadow: 0 6px 14px rgba(0,0,0,.35);
    display: flex; align-items: flex-end; justify-content: center;
    transition: transform .12s ease, border-color .12s ease;
  }
  .pick .face { display: flex; gap: 12%; margin-bottom: 34%; }
  .pick .eye {
    width: 1.9vw; height: 1.9vw; max-width: 12px; max-height: 12px;
    background: #fff; border-radius: 50%; position: relative;
  }
  .pick .eye::after {
    content: ""; position: absolute; width: 55%; height: 55%;
    background: #111; border-radius: 50%; left: 30%; top: 28%;
  }
  .pick.sel { border-color: #ffd34d; transform: scale(1.14); }
  .pick.sel::after {
    content: "✓"; position: absolute; top: -10px; right: -6px;
    background: #ffd34d; color: #7a0d0d; font-weight: bold;
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    box-shadow: 0 2px 6px rgba(0,0,0,.4);
  }
  .pick { position: relative; }

  .big-score { font-size: 18vw; font-weight: bold; color: #ffd34d;
    text-shadow: 0 3px 0 #7a0d0d; margin: 1vh 0 1vh; }
  .best { font-size: 5vw; color: #ffe9a8; margin-bottom: 5vh; }

  /* ---- Dragon Facts interlude ---- */
  .story-pic { width: 42vw; max-width: 176px; margin-bottom: 1.5vh;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,.35)); }
  .story-pic svg { width: 100%; height: auto; display: block; }
  .story-badge {
    font-size: 4vw; font-weight: bold; color: #7a0d0d;
    background: linear-gradient(#ffe27a, #ffc42e);
    padding: 1vh 5vw; border-radius: 999px; margin-bottom: 2.5vh;
    box-shadow: 0 3px 0 #b8860b;
  }
  .story-title { font-size: 8vw; font-weight: bold; color: #ffd34d;
    text-shadow: 0 2px 0 #7a0d0d; margin-bottom: 2vh; }
  .story-text { font-size: 5.4vw; line-height: 1.45; color: #fff6df;
    max-width: 620px; margin-bottom: 4vh; }
  .story-btns { display: flex; flex-direction: column; align-items: center; gap: 2.2vh; }
  .btn-small {
    font-size: 5vw; padding: 2.6vw 8vw; color: #7a0d0d;
    background: linear-gradient(#cdeffd, #8fd6f2);
    box-shadow: 0 5px 0 #4a97b8, 0 8px 16px rgba(0,0,0,.3);
  }

  /* On wider screens (landscape / big tablets) cap the giant text */
  @media (min-width: 700px) {
    .title { font-size: 84px; }
    .dragon-emoji { font-size: 130px; }
    .subtitle { font-size: 30px; }
    .btn { font-size: 40px; padding: 20px 70px; }
    .big-score { font-size: 120px; }
    .best { font-size: 32px; }
    .pick-label { font-size: 28px; }
    .picker { gap: 40px; }
    .pick-name { font-size: 24px; }
    .story-pic { width: 176px; }
    .story-badge { font-size: 20px; padding: 8px 30px; }
    .story-title { font-size: 46px; }
    .story-text { font-size: 27px; }
    .btn-small { font-size: 24px; padding: 14px 44px; }
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<!-- START SCREEN -->
<div id="startScreen" class="screen">
  <div class="dragon-emoji">🐉</div>
  <div class="title">Dragon's<br>Pearl Chase</div>
  <div class="subtitle">Drag your finger to fly the dragon.<br>Collect the golden pearls! ✨<br>Dodge the Nián monster!</div>
  <div class="pick-label">Pick your dragon</div>
  <div class="picker" id="picker">
    <div class="pick-opt">
      <button class="pick" data-dragon="green" style="--c:#1fae5a"><span class="face"><span class="eye"></span><span class="eye"></span></span></button>
      <span class="pick-name">Jade</span>
    </div>
    <div class="pick-opt">
      <button class="pick" data-dragon="teal" style="--c:#3fc9b0"><span class="face"><span class="eye"></span><span class="eye"></span></span></button>
      <span class="pick-name">Opal</span>
    </div>
    <div class="pick-opt">
      <button class="pick" data-dragon="pink" style="--c:#ff6fb0"><span class="face"><span class="eye"></span><span class="eye"></span></span></button>
      <span class="pick-name">Blossom</span>
    </div>
  </div>
  <button id="startBtn" class="btn">Play!</button>
</div>

<!-- DRAGON FACTS INTERLUDE -->
<div id="storyScreen" class="screen hidden">
  <div class="story-pic" id="storyPic"></div>
  <div class="story-badge" id="storyBadge">Level 1 done!</div>
  <div class="story-title" id="storyTitle">Friendly Dragons</div>
  <div class="story-text" id="storyText"></div>
  <div class="story-btns">
    <button id="continueBtn" class="btn">Keep flying! →</button>
    <button id="readBtn" class="btn btn-small">🔊 Read to me</button>
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div id="overScreen" class="screen hidden">
  <div class="dragon-emoji">🐲</div>
  <div class="title" style="font-size:11vw">Great flying!</div>
  <div class="big-score"><span id="finalScore">0</span> 🟡</div>
  <div class="best">Best: <span id="bestScore">0</span></div>
  <button id="againBtn" class="btn">Play Again</button>
</div>

<script>
(function () {
  "use strict";

  // If anything ever throws, show it on screen instead of a silent blank canvas.
  window.addEventListener("error", function (e) {
    var d = document.getElementById("errbox");
    if (!d) {
      d = document.createElement("div");
      d.id = "errbox";
      d.style.cssText = "position:fixed;left:0;right:0;bottom:0;z-index:9999;background:#000;color:#0f0;font:14px monospace;padding:8px;white-space:pre-wrap;";
      document.body.appendChild(d);
    }
    d.textContent = "Oops: " + (e.message || e.error) + "\n" + (e.filename || "") + ":" + (e.lineno || "");
  });

  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  // ---------- Simple sound (Web Audio, no files) ----------
  var AC = null;
  function audio() {
    if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    // iOS Safari often leaves a freshly-created (or backgrounded) context "suspended"
    // even inside a real tap, silently dropping every beep unless explicitly resumed.
    if (AC && AC.state === "suspended") { try { AC.resume(); } catch (e) {} }
    return AC;
  }
  function beep(freq, dur, type, vol) {
    var a = audio(); if (!a) return;
    try {
      var o = a.createOscillator(), g = a.createGain();
      o.type = type || "sine"; o.frequency.value = freq;
      g.gain.value = vol || 0.08;
      o.connect(g); g.connect(a.destination);
      var t = a.currentTime;
      o.start(t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.stop(t + dur);
    } catch (e) {}
  }
  function pearlSound() { beep(660, 0.12, "triangle", 0.10); setTimeout(function(){ beep(990, 0.12, "triangle", 0.09); }, 60); }
  function bonkSound() { beep(140, 0.25, "sawtooth", 0.10); }

  // ---------- Game state ----------
  var state = "start"; // start | play | celebrate | story | over
  var score = 0, lives = 3;
  var level = 1, pearlsInLevel = 0, levelBanner = 0;
  function goalForLevel(l) { return 3 + l * 2; } // L1:5, L2:7, L3:9, ...

  // ---------- Level-complete celebration (confetti before the Dragon Fact) ----------
  var CELEBRATE_DURATION = 2.4; // seconds
  var celebrateTimer = 0, celebrateBurst2Done = false;
  var confetti = [];

  // Kid-friendly (ages 5-8), culturally grounded facts about Chinese dragons.

    { title: "Friendly Dragons",

      svg: '<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">' +
        '<circle cx="60" cy="60" r="54" fill="#fff4d6" stroke="#ffc42e" stroke-width="4"/>' +
        '<path d="M78 44 q8 -12 3 -24" stroke="#ffcf3f" stroke-width="7" fill="none" stroke-linecap="round"/>' +
        '<path d="M64 40 q0 -14 -7 -22" stroke="#ffcf3f" stroke-width="7" fill="none" stroke-linecap="round"/>' +
        '<ellipse cx="60" cy="66" rx="30" ry="27" fill="#1fae5a"/>' +

        '</svg>' },

    { title: "The Dragon Dance",

        '<path d="M87 52 q3 -6 -1 -11" stroke="#c8892e" stroke-width="2" fill="none"/>' +
        '<circle cx="86" cy="39" r="4.5" fill="#ffd34d"/><circle cx="86" cy="39" r="2" fill="#ff8a3d"/>' +

        '<path d="M50 58 q6 -8 12 -2 q-4 6 -10 4 q6 4 12 -2" stroke="#ffd34d" stroke-width="3" fill="none" stroke-linecap="round"/>' +
        '</svg>' },
    { title: "Guardian Dragons",
      audio: "audio/guardian-dragons.mp3",
      text: "People carve dragons on temples, gates, and bridges because dragons are brave guardians who watch over homes and keep families safe.",
      svg: '<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">' +
        '<circle cx="60" cy="60" r="54" fill="#fff4d6" stroke="#ffc42e" stroke-width="4"/>' +
        '<path d="M26 46 q34 -22 68 0 q-6 6 -14 6 h-40 q-8 0 -14 -6 z" fill="#d41d1d"/>' +
        '<rect x="34" y="52" width="52" height="6" fill="#ffcf3f"/>' +
        '<rect x="38" y="58" width="8" height="34" fill="#c8892e"/>' +
        '<rect x="74" y="58" width="8" height="34" fill="#c8892e"/>' +
        '<rect x="30" y="90" width="60" height="6" rx="2" fill="#8a5a2b"/>' +
        '<path d="M52 76 q8 -10 16 0" stroke="#1fae5a" stroke-width="8" fill="none" stroke-linecap="round"/>' +
        '<circle cx="52" cy="76" r="6" fill="#1fae5a"/><circle cx="50" cy="75" r="2" fill="#fff"/>' +
        '<path d="M52 70 q2 -5 0 -9" stroke="#ffcf3f" stroke-width="3" fill="none" stroke-linecap="round"/>' +
        '</svg>' }
  ];
  var currentFactText = "";
  var currentFactAudio = "";
  var best = 0;
  try { best = parseInt(localStorage.getItem("dragonBest") || "0", 10) || 0; } catch (e) {}

  // ---------- Dragon colors ----------
  // style "lung": classic Chinese serpent look (a = light scales, b = dark scales, whiskers).
  // style "toy":  iridescent gradient body + toy-style head (grad = head->tail color stops).
  var DRAGONS = {
    green: { name: "Jade",    style: "lung", a: "#1fae5a", b: "#12924a" },
    teal:  { name: "Opal",    style: "toy",  a: "#3fc9b0", b: "#8a6fd0", grad: ["#35c9b3", "#3f9fe0", "#8a6fd0"] },
    pink:  { name: "Blossom", style: "lung", a: "#ff6fb0", b: "#ec4f95" }
  };
  var chosen = "green";
  try { var sv = localStorage.getItem("dragonColor"); if (sv && DRAGONS[sv]) chosen = sv; } catch (e) {}

  var target = { x: W / 2, y: H / 2 };   // where finger is
  var segments = [];                      // dragon body points
  var baseLen = 22;                       // number of body segments
  var segLen = 14;                        // spacing between segments
  var headR = 20;

  var pearls = [];
  var nians = [];
  var sparkles = [];
  var invuln = 0;                         // invulnerability timer after a bonk
  var lastTime = 0, spawnTimer = 0;

  function reset() {
    score = 0; lives = 3; invuln = 0;
    level = 1; pearlsInLevel = 0; levelBanner = 0;
    celebrateTimer = 0; celebrateBurst2Done = false; confetti = [];
    target.x = W / 2; target.y = H / 2;
    segments = [];
    for (var i = 0; i < baseLen; i++) segments.push({ x: W / 2, y: H / 2 + i * segLen });
    pearls = []; nians = []; sparkles = [];
    for (var p = 0; p < 4; p++) spawnPearl();
    var startN = nianTarget(level);
    for (var f = 0; f < startN; f++) spawnNian();
    spawnTimer = 0;
  }

  // How many Nián monsters should be on screen, and how fast, for a level (steeper each level).
  function nianTarget(l) { return Math.min(1 + Math.ceil(l * 1.4), 12); } // L1:3 L2:4 L3:6 ... cap 12
  function nianSpeed(l) { return rand(0.9, 1.5) + (l - 1) * 0.5; }

  // Confetti particles for the level-complete celebration.
  var CONFETTI_COLORS = ["#ffd34d", "#ff5a7a", "#3fc9b0", "#ff6fb0", "#1fae5a", "#fff2a8"];
  function spawnConfettiBurst(cx, cy, count) {
    for (var i = 0; i < count; i++) {
      confetti.push({
        x: cx + rand(-40, 40), y: cy + rand(-20, 20),
        vx: rand(-3, 3), vy: rand(-7, -3),
        rot: rand(0, 6.28), vrot: rand(-0.25, 0.25),
        w: rand(6, 11), h: rand(9, 15),
        color: CONFETTI_COLORS[Math.floor(rand(0, CONFETTI_COLORS.length))]
      });
    }
  }
  function spawnConfettiRain(count) {
    for (var i = 0; i < count; i++) {
      confetti.push({
        x: rand(0, W), y: rand(-H * 0.6, -10),
        vx: rand(-1, 1), vy: rand(1, 3),
        rot: rand(0, 6.28), vrot: rand(-0.2, 0.2),
        w: rand(6, 11), h: rand(9, 15),
        color: CONFETTI_COLORS[Math.floor(rand(0, CONFETTI_COLORS.length))]
      });
    }
  }

  // Finished a level -> celebrate with confetti before the Dragon Fact.
  function enterCelebrate() {
    state = "celebrate";
    celebrateTimer = CELEBRATE_DURATION;
    celebrateBurst2Done = false;
    confetti = [];
    var head = segments[0];
    spawnConfettiBurst(head.x, head.y, 34);
    spawnConfettiRain(40);
    spawnSparkle(head.x, head.y, "#ffd34d");
    spawnSparkle(head.x, head.y, "#fff2a8");
    // cheerful ascending chime
    var notes = [523, 587, 659, 784, 1046];
    notes.forEach(function (freq, i) {
      setTimeout(function () { beep(freq, 0.18, "triangle", 0.11); }, i * 80);
    });
    setTimeout(function () { beep(1568, 0.3, "sine", 0.09); }, notes.length * 80 + 60);
  }

  function updateCelebrate(dt) {
    celebrateTimer -= dt;
    if (!celebrateBurst2Done && celebrateTimer < CELEBRATE_DURATION - 0.9) {
      celebrateBurst2Done = true;
      spawnConfettiBurst(W * 0.28, H * 0.32, 18);
      spawnConfettiBurst(W * 0.72, H * 0.32, 18);
    }
    for (var i = confetti.length - 1; i >= 0; i--) {
      var c = confetti[i];
      c.vy += 0.22; // gravity
      c.x += c.vx; c.y += c.vy; c.rot += c.vrot;
      if (c.y > H + 30) confetti.splice(i, 1);
    }
    // sparkles keep their own physics too, since update() is paused during celebrate
    for (var s = sparkles.length - 1; s >= 0; s--) {
      var sp = sparkles[s];
      sp.x += sp.vx; sp.y += sp.vy; sp.vx *= 0.92; sp.vy *= 0.92;
      sp.life -= dt * 2;
      if (sp.life <= 0) sparkles.splice(s, 1);
    }
    if (celebrateTimer <= 0) {
      confetti = [];
      enterStory();
    }
  }

  // Pause on the fact for this level (called automatically once the celebration finishes).
  function enterStory() {
    state = "story";
    var fact = FACTS[(level - 1) % FACTS.length]; // fact for the level just finished
    currentFactText = fact.text;
    currentFactAudio = fact.audio || "";
    document.getElementById("storyPic").innerHTML = fact.svg;
    document.getElementById("storyBadge").textContent = "Level " + level + " done!";
    document.getElementById("storyTitle").textContent = fact.title;
    document.getElementById("storyText").textContent = fact.text;
    document.getElementById("storyScreen").classList.remove("hidden");
  }

  // Continue button -> start the next (harder) level.
  function nextLevel() {
    stopSpeak();
    document.getElementById("storyScreen").classList.add("hidden");
    level++;
    pearlsInLevel = 0;
    if (lives < 3) lives++;            // reward: a heart back (kept gentle)
    var want = nianTarget(level);
    while (nians.length < want) spawnNian();
    levelBanner = 1.6;                 // quick "Level N!" flash as play resumes
    lastTime = 0;
    state = "play";
    step((window.performance && performance.now) ? performance.now() : Date.now());
  }

  // ---------- Read aloud ----------
  // Primary: pre-recorded narration (generated once offline with Kokoro TTS, bundled as
  // small MP3s in audio/) so it sounds natural and still works with no internet connection.
  // Fallback: the browser's built-in speech synthesis, only used if a clip fails to load.
  var factAudioEl = null;
  function getFactAudioEl() {
    if (!factAudioEl) { factAudioEl = new Audio(); factAudioEl.preload = "none"; }
    return factAudioEl;
  }
  function speakFallback(text) {
    try {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.rate = 0.92; u.pitch = 1.1; u.volume = 1;
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }
  function playFact() {
    stopSpeak();
    if (!currentFactAudio) { speakFallback(currentFactText); return; }
    try {
      var a = getFactAudioEl();
      a.onerror = function () { speakFallback(currentFactText); };
      a.src = currentFactAudio;
      var p = a.play();
      if (p && p.catch) p.catch(function () { speakFallback(currentFactText); });
    } catch (e) { speakFallback(currentFactText); }
  }
  function stopSpeak() {
    try { if (factAudioEl) { factAudioEl.pause(); factAudioEl.currentTime = 0; } } catch (e) {}
    try { if ("speechSynthesis" in window) window.speechSynthesis.cancel(); } catch (e) {}
  }

  function rand(a, b) { return a + Math.random() * (b - a); }

  function spawnPearl() {
    pearls.push({
      x: rand(40, W - 40), y: rand(80, H - 40),
      vx: rand(-0.3, 0.3), vy: rand(-0.3, 0.3),
      r: 16, pop: 0, wob: rand(0, 6.28)
    });
  }
  function spawnNian() {
    var edge = Math.floor(rand(0, 4));
    var x, y;
    if (edge === 0) { x = rand(0, W); y = -30; }
    else if (edge === 1) { x = W + 30; y = rand(0, H); }
    else if (edge === 2) { x = rand(0, W); y = H + 30; }
    else { x = -30; y = rand(0, H); }
    var speed = nianSpeed(level);
    var ang = Math.atan2(H / 2 - y, W / 2 - x) + rand(-0.6, 0.6);
    nians.push({ x: x, y: y, vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed, r: 17, bob: rand(0, 6.28) });
  }

  function spawnSparkle(x, y, color) {
    for (var i = 0; i < 8; i++) {
      var a = rand(0, 6.28), s = rand(1, 4);
      sparkles.push({ x: x, y: y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, color: color });
    }
  }

  // ---------- Input ----------
  function pointerPos(e) {
    var t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
    return { x: t.clientX, y: t.clientY };
  }
  function onMove(e) {
    if (state !== "play") return;
    e.preventDefault();
    var p = pointerPos(e);
    target.x = p.x; target.y = p.y;
  }
  canvas.addEventListener("touchstart", onMove, { passive: false });
  canvas.addEventListener("touchmove", onMove, { passive: false });
  canvas.addEventListener("mousedown", function (e) { canvas._down = true; onMove(e); });
  canvas.addEventListener("mousemove", function (e) { if (canvas._down) onMove(e); });
  window.addEventListener("mouseup", function () { canvas._down = false; });

  // ---------- Update ----------
  function update(dt) {
    // Head eases toward finger
    var head = segments[0];
    var dx = target.x - head.x, dy = target.y - head.y;
    head.x += dx * 0.18;
    head.y += dy * 0.18;

    // Body follows
    for (var i = 1; i < segments.length; i++) {
      var prev = segments[i - 1], cur = segments[i];
      var ax = cur.x - prev.x, ay = cur.y - prev.y;
      var d = Math.sqrt(ax * ax + ay * ay) || 0.0001;
      cur.x = prev.x + (ax / d) * segLen;
      cur.y = prev.y + (ay / d) * segLen;
    }

    if (invuln > 0) invuln -= dt;
    if (levelBanner > 0) levelBanner -= dt;

    // Pearls
    for (var p = pearls.length - 1; p >= 0; p--) {
      var pe = pearls[p];
      pe.x += pe.vx; pe.y += pe.vy; pe.wob += 0.1;
      if (pe.x < 20 || pe.x > W - 20) pe.vx *= -1;
      if (pe.y < 60 || pe.y > H - 20) pe.vy *= -1;
      var hx = head.x - pe.x, hy = head.y - pe.y;
      if (hx * hx + hy * hy < (headR + pe.r) * (headR + pe.r)) {
        score++;
        pearlsInLevel++;
        pearlSound();
        spawnSparkle(pe.x, pe.y, "#ffd34d");
        pearls.splice(p, 1);
        spawnPearl();
        // Dragon grows a little, up to a limit
        if (segments.length < 60) {
          var tail = segments[segments.length - 1];
          segments.push({ x: tail.x, y: tail.y });
        }
        // Reached the pearl goal for this level? Celebrate, then show a Dragon Fact.
        if (pearlsInLevel >= goalForLevel(level)) enterCelebrate();
      }
    }

    // Nián monsters
    for (var f = nians.length - 1; f >= 0; f--) {
      var nn = nians[f];
      nn.x += nn.vx; nn.y += nn.vy; nn.bob += 0.15;
      // bounce off walls so they stay on screen
      if (nn.x < 20 && nn.vx < 0) nn.vx *= -1;
      if (nn.x > W - 20 && nn.vx > 0) nn.vx *= -1;
      if (nn.y < 60 && nn.vy < 0) nn.vy *= -1;
      if (nn.y > H - 20 && nn.vy > 0) nn.vy *= -1;
      if (invuln <= 0) {
        var gx = head.x - nn.x, gy = head.y - nn.y;
        if (gx * gx + gy * gy < (headR + nn.r) * (headR + nn.r)) {
          lives--;
          bonkSound();
          spawnSparkle(nn.x, nn.y, "#c3ccdf");
          invuln = 1.2;
          // push it away so it doesn't double-hit
          nn.vx *= -1; nn.vy *= -1;
          if (lives <= 0) endGame();
        }
      }
    }

    // Sparkles
    for (var s = sparkles.length - 1; s >= 0; s--) {
      var sp = sparkles[s];
      sp.x += sp.vx; sp.y += sp.vy; sp.vx *= 0.92; sp.vy *= 0.92;
      sp.life -= dt * 2;
      if (sp.life <= 0) sparkles.splice(s, 1);
    }
  }

  // ---------- Draw ----------
  function drawBackground() {
    ctx.fillStyle = "#b81414";
    ctx.fillRect(0, 0, W, H);
    // subtle gold clouds
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = "#ffd34d";
    for (var i = 0; i < 6; i++) {
      var cx = ((i * 197 + (Date.now() * 0.01)) % (W + 200)) - 100;
      var cy = 80 + (i % 3) * (H / 3);
      ctx.beginPath();
      ctx.arc(cx, cy, 46, 0, 6.28);
      ctx.arc(cx + 40, cy + 10, 34, 0, 6.28);
      ctx.arc(cx - 40, cy + 10, 34, 0, 6.28);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Color helpers for the iridescent "toy" dragon gradient.
  function hexToRgb(h) { h = h.replace("#", ""); return [parseInt(h.substr(0, 2), 16), parseInt(h.substr(2, 2), 16), parseInt(h.substr(4, 2), 16)]; }
  function gradAt(stops, t) {
    if (!stops || stops.length === 0) return "#3fc9b0";
    if (stops.length === 1) return stops[0];
    t = Math.max(0, Math.min(1, t));
    var n = stops.length - 1;
    var seg = Math.min(Math.floor(t * n), n - 1);
    var local = (t * n) - seg;
    var c1 = hexToRgb(stops[seg]), c2 = hexToRgb(stops[seg + 1]);
    return "rgb(" + Math.round(c1[0] + (c2[0] - c1[0]) * local) + "," +
                    Math.round(c1[1] + (c2[1] - c1[1]) * local) + "," +
                    Math.round(c1[2] + (c2[2] - c1[2]) * local) + ")";
  }

  function drawDragon() {
    if (segments.length === 0) return; // no dragon until the game starts
    var pal = DRAGONS[chosen] || DRAGONS.green;
    var toy = (pal.style || "lung") === "toy";
    var blink = invuln > 0 && Math.floor(Date.now() / 100) % 2 === 0;

    // Body ribbon
    for (var i = segments.length - 1; i >= 0; i--) {
      var seg = segments[i];
      var t = i / segments.length;
      var r = (headR - 4) * (1 - t * 0.55) + 4;
      ctx.beginPath();
      if (toy) ctx.fillStyle = blink ? "#ffffff" : gradAt(pal.grad, t);   // teal->blue->purple
      else ctx.fillStyle = blink ? "#ffffff" : (i % 2 === 0 ? pal.a : pal.b);
      ctx.arc(seg.x, seg.y, r, 0, 6.28);
      ctx.fill();
      // belly: gold for lung, pearlescent highlight for toy
      ctx.beginPath();
      ctx.fillStyle = toy ? "rgba(255,255,255,0.32)" : "#ffe27a";
      ctx.arc(seg.x, seg.y, r * 0.4, 0, 6.28);
      ctx.fill();
    }

    // Spikes along the back (chunkier for the toy dragon)
    var spikeColor = toy ? "#d6efe6" : "#ffcf3f";
    var spikeOut = toy ? 19 : 14, spikeBase = toy ? 7 : 4;
    for (var j = 2; j < segments.length; j += 2) {
      var a = segments[j - 1], b = segments[j];
      var mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      var dx = b.x - a.x, dy = b.y - a.y;
      var len = Math.sqrt(dx * dx + dy * dy) || 1;
      var nx = -dy / len, ny = dx / len;
      ctx.beginPath();
      ctx.fillStyle = spikeColor;
      ctx.moveTo(mx + nx * spikeBase, my + ny * spikeBase);
      ctx.lineTo(mx + nx * spikeOut, my + ny * spikeOut);
      ctx.lineTo(mx - nx * spikeBase + dx * 0.3, my - ny * spikeBase + dy * 0.3);
      ctx.fill();
    }

    // Head
    var head = segments[0];
    var next = segments[1] || head;
    var hdx = head.x - next.x, hdy = head.y - next.y;
    var hlen = Math.sqrt(hdx * hdx + hdy * hdy) || 1;
    var dirx = hdx / hlen, diry = hdy / hlen;
    var px = -diry, py = dirx;

    if (toy) drawToyHead(head, dirx, diry, px, py, pal, blink);
    else drawLungHead(head, dirx, diry, px, py, pal, blink);
  }

  // Classic Chinese serpent head: gold horns, round eyes, whiskers.
  function drawLungHead(head, dirx, diry, px, py, pal, blink) {
    ctx.beginPath();
    ctx.fillStyle = blink ? "#ffffff" : pal.a;
    ctx.arc(head.x, head.y, headR, 0, 6.28);
    ctx.fill();
    // Horns
    ctx.strokeStyle = "#ffcf3f"; ctx.lineWidth = 4; ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(head.x + px * 8, head.y + py * 8);
    ctx.lineTo(head.x + px * 14 - dirx * 12, head.y + py * 14 - diry * 12);
    ctx.moveTo(head.x - px * 8, head.y - py * 8);
    ctx.lineTo(head.x - px * 14 - dirx * 12, head.y - py * 14 - diry * 12);
    ctx.stroke();
    // Eyes
    var ex = head.x + dirx * 4, ey = head.y + diry * 4;
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(ex + px * 8, ey + py * 8, 6, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(ex - px * 8, ey - py * 8, 6, 0, 6.28); ctx.fill();
    ctx.fillStyle = "#111";
    ctx.beginPath(); ctx.arc(ex + px * 8 + dirx * 2, ey + py * 8 + diry * 2, 3, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(ex - px * 8 + dirx * 2, ey - py * 8 + diry * 2, 3, 0, 6.28); ctx.fill();
    // Whiskers
    ctx.strokeStyle = "#ffe27a"; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(head.x + dirx * headR, head.y + diry * headR);
    ctx.quadraticCurveTo(head.x + dirx * (headR + 18) + px * 10, head.y + diry * (headR + 18) + py * 10,
                         head.x + dirx * (headR + 30) + px * 4, head.y + diry * (headR + 30) + py * 4);
    ctx.moveTo(head.x + dirx * headR, head.y + diry * headR);
    ctx.quadraticCurveTo(head.x + dirx * (headR + 18) - px * 10, head.y + diry * (headR + 18) - py * 10,
                         head.x + dirx * (headR + 30) - px * 4, head.y + diry * (headR + 30) - py * 4);
    ctx.stroke();
  }

  // Toy baby-dragon head: bigger, one big curved horn + a small one, gentle eyes,
  // snout with nostrils, little wing nubs, no whiskers.
  function drawToyHead(head, dirx, diry, px, py, pal, blink) {
    var R = headR + 4;
    var stops = pal.grad || [pal.a, pal.b];
    var headColor = blink ? "#ffffff" : gradAt(stops, 0);
    // wing nubs behind the head
    ctx.fillStyle = blink ? "#ffffff" : gradAt(stops, 0.4);
    ctx.beginPath(); ctx.ellipse(head.x - dirx * 12 + px * 14, head.y - diry * 12 + py * 14, 9, 5, 0, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.ellipse(head.x - dirx * 12 - px * 14, head.y - diry * 12 - py * 14, 9, 5, 0, 0, 6.28); ctx.fill();
    // head
    ctx.beginPath(); ctx.fillStyle = headColor; ctx.arc(head.x, head.y, R, 0, 6.28); ctx.fill();
    // snout highlight
    ctx.beginPath(); ctx.fillStyle = "rgba(255,255,255,0.22)";
    ctx.arc(head.x + dirx * (R * 0.55), head.y + diry * (R * 0.55), R * 0.5, 0, 6.28); ctx.fill();
    // big curved horn + a small one
    ctx.strokeStyle = "#ece0b8"; ctx.lineCap = "round"; ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(head.x - dirx * 4 + px * 3, head.y - diry * 4 + py * 3);
    ctx.quadraticCurveTo(head.x - dirx * 22 + px * 6, head.y - diry * 22 + py * 6,
                         head.x - dirx * 30 + px * 12, head.y - diry * 30 + py * 12);
    ctx.stroke();
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(head.x - dirx * 4 - px * 5, head.y - diry * 4 - py * 5);
    ctx.lineTo(head.x - dirx * 16 - px * 12, head.y - diry * 16 - py * 12);
    ctx.stroke();
    // gentle round eyes
    var ex = head.x + dirx * 5, ey = head.y + diry * 5;
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(ex + px * 8, ey + py * 8, 5, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(ex - px * 8, ey - py * 8, 5, 0, 6.28); ctx.fill();
    ctx.fillStyle = "#20303a";
    ctx.beginPath(); ctx.arc(ex + px * 8 + dirx * 2, ey + py * 8 + diry * 2, 2.6, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(ex - px * 8 + dirx * 2, ey - py * 8 + diry * 2, 2.6, 0, 6.28); ctx.fill();
    // nostrils on the snout
    var sx = head.x + dirx * (R * 0.92), sy = head.y + diry * (R * 0.92);
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.beginPath(); ctx.arc(sx + px * 3.5, sy + py * 3.5, 1.7, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(sx - px * 3.5, sy - py * 3.5, 1.7, 0, 6.28); ctx.fill();
  }

  function drawPearl(pe) {
    var wob = Math.sin(pe.wob) * 2;
    // glow
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = "#ffd34d";
    ctx.beginPath(); ctx.arc(pe.x, pe.y + wob, pe.r + 8, 0, 6.28); ctx.fill();
    ctx.globalAlpha = 1;
    // pearl
    var g = ctx.createRadialGradient(pe.x - 5, pe.y - 5 + wob, 2, pe.x, pe.y + wob, pe.r);
    g.addColorStop(0, "#fffbe6"); g.addColorStop(0.5, "#ffd34d"); g.addColorStop(1, "#e8a600");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(pe.x, pe.y + wob, pe.r, 0, 6.28); ctx.fill();
    // shine
    ctx.fillStyle = "rgba(255,255,255,.8)";
    ctx.beginPath(); ctx.arc(pe.x - 5, pe.y - 5 + wob, 4, 0, 6.28); ctx.fill();
  }

  // The Nián: a small, cute-but-grumpy monster to dodge. Slate blue-grey so it stands out
  // from the red background and every dragon color (green Jade, teal Opal, pink Blossom).
  function drawNian(n) {
    var bob = Math.sin(n.bob) * 3;
    ctx.save();
    ctx.translate(n.x, n.y + bob);
    // little legs
    ctx.fillStyle = "#3f4d6b";
    ctx.beginPath(); ctx.arc(-8, 12, 4, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(8, 12, 4, 0, 6.28); ctx.fill();
    // body
    ctx.fillStyle = "#5b6b8c";
    ctx.beginPath(); ctx.arc(0, 0, 15, 0, 6.28); ctx.fill();
    // belly
    ctx.fillStyle = "#7d8cad";
    ctx.beginPath(); ctx.arc(0, 3, 9, 0, 6.28); ctx.fill();
    // horns
    ctx.strokeStyle = "#e8d9a0"; ctx.lineWidth = 3; ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(-7, -12); ctx.lineTo(-11, -21);
    ctx.moveTo(7, -12); ctx.lineTo(11, -21);
    ctx.stroke();
    // grumpy brows
    ctx.strokeStyle = "#3f4d6b"; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(-11, -8); ctx.lineTo(-3, -5);
    ctx.moveTo(11, -8); ctx.lineTo(3, -5);
    ctx.stroke();
    // eyes
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(-6, -2, 5, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(6, -2, 5, 0, 6.28); ctx.fill();
    ctx.fillStyle = "#1a2233";
    ctx.beginPath(); ctx.arc(-6, -1, 2.5, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(6, -1, 2.5, 0, 6.28); ctx.fill();
    // mouth + little fangs
    ctx.fillStyle = "#3a1a26";
    ctx.beginPath(); ctx.ellipse(0, 8, 6, 3, 0, 0, 6.28); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.moveTo(-4, 7); ctx.lineTo(-2, 11); ctx.lineTo(-1, 7); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(4, 7); ctx.lineTo(2, 11); ctx.lineTo(1, 7); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawHUD() {
    // Score
    ctx.font = "bold 26px 'Trebuchet MS', sans-serif";
    ctx.textBaseline = "top";
    ctx.fillStyle = "#ffe9a8";
    ctx.strokeStyle = "rgba(0,0,0,.35)"; ctx.lineWidth = 4;
    var label = "🟡 " + score;
    ctx.strokeText(label, 16, 14);
    ctx.fillText(label, 16, 14);
    // Lives (hearts)
    var hx = W - 16;
    ctx.textAlign = "right";
    ctx.font = "26px sans-serif";
    var hearts = "";
    for (var i = 0; i < lives; i++) hearts += "❤️";
    for (var j = lives; j < 3; j++) hearts += "🖤";
    ctx.fillText(hearts, hx, 14);

    // Level + dragon name + progress (top center)
    var nm = (DRAGONS[chosen] || {}).name || "Dragon";
    ctx.textAlign = "center";
    ctx.font = "bold 24px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = "#ffe9a8";
    var lvl = nm + " · Level " + level;
    ctx.strokeText(lvl, W / 2, 12);
    ctx.fillText(lvl, W / 2, 12);
    // little pearl progress dots toward the next level
    var goal = goalForLevel(level);
    var dot = 7, gap = 6, total = goal * (dot * 2 + gap) - gap;
    var sx = W / 2 - total / 2 + dot;
    for (var k = 0; k < goal; k++) {
      ctx.beginPath();
      ctx.fillStyle = k < pearlsInLevel ? "#ffd34d" : "rgba(255,255,255,.28)";
      ctx.arc(sx + k * (dot * 2 + gap), 46, dot, 0, 6.28);
      ctx.fill();
    }
    ctx.textAlign = "left";
  }

  function draw() {
    drawBackground();
    for (var p = 0; p < pearls.length; p++) drawPearl(pearls[p]);
    for (var f = 0; f < nians.length; f++) drawNian(nians[f]);
    drawDragon();
    for (var s = 0; s < sparkles.length; s++) {
      var sp = sparkles[s];
      ctx.globalAlpha = Math.max(0, sp.life);
      ctx.fillStyle = sp.color;
      ctx.beginPath(); ctx.arc(sp.x, sp.y, 4, 0, 6.28); ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (state === "play") drawHUD();

    // Level-up banner
    if (state === "play" && levelBanner > 0) {
      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.globalAlpha = Math.max(0, Math.min(1, levelBanner));
      var pop = 1 + Math.max(0, levelBanner - 1.7) * 1.2; // little pop-in
      ctx.font = "bold " + Math.round(60 * pop) + "px 'Comic Sans MS', sans-serif";
      ctx.lineWidth = 8; ctx.strokeStyle = "#7a0d0d";
      ctx.fillStyle = "#ffd34d";
      var msg = "Level " + level + "!";
      ctx.strokeText(msg, W / 2, H / 2 - 16);
      ctx.fillText(msg, W / 2, H / 2 - 16);
      ctx.font = "bold 26px 'Comic Sans MS', sans-serif";
      ctx.fillStyle = "#ffe9a8";
      var nm2 = (DRAGONS[chosen] || {}).name || "Dragon";
      ctx.fillText(nm2 + " flies faster!", W / 2, H / 2 + 34);
      ctx.restore();
    }

    if (state === "celebrate") drawCelebrate();
  }

  function drawConfettiPiece(c, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
    ctx.restore();
  }

  // Level-complete celebration: dim overlay, rotating gold starburst, confetti, bouncy title.
  function drawCelebrate() {
    var elapsed = CELEBRATE_DURATION - celebrateTimer;

    ctx.save();
    ctx.globalAlpha = Math.min(0.45, elapsed * 1.5);
    ctx.fillStyle = "#4a0606";
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    // rotating gold starburst behind the title
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.rotate(elapsed * 0.6);
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = "#ffd34d";
    var rays = 10, r1 = 40, r2 = W * 0.55;
    ctx.beginPath();
    for (var i = 0; i < rays * 2; i++) {
      var ang = (i / (rays * 2)) * 6.283;
      var rr = i % 2 === 0 ? r2 : r1;
      var rx = Math.cos(ang) * rr, ry = Math.sin(ang) * rr;
      if (i === 0) ctx.moveTo(rx, ry); else ctx.lineTo(rx, ry);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // confetti, fading out gently in the final half-second
    var confettiAlpha = Math.min(1, celebrateTimer / 0.5);
    for (var c = 0; c < confetti.length; c++) drawConfettiPiece(confetti[c], confettiAlpha);

    // bouncy "Level N Complete!" title
    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    var bounce = Math.exp(-elapsed * 6) * Math.cos(elapsed * 16);
    var scale = 1 + Math.max(-0.35, bounce * 0.4);
    ctx.globalAlpha = Math.min(1, elapsed * 4);
    ctx.translate(W / 2, H * 0.38);
    ctx.scale(scale, scale);
    ctx.font = "bold 58px 'Comic Sans MS', sans-serif";
    ctx.lineWidth = 9; ctx.strokeStyle = "#7a0d0d";
    ctx.fillStyle = "#ffd34d";
    var title = "Level " + level + " Complete!";
    ctx.strokeText(title, 0, 0);
    ctx.fillText(title, 0, 0);
    ctx.restore();

    // sub text
    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.globalAlpha = Math.min(1, Math.max(0, (elapsed - 0.3) * 3));
    ctx.font = "bold 28px 'Comic Sans MS', sans-serif";
    ctx.fillStyle = "#ffe9a8";
    var nm3 = (DRAGONS[chosen] || {}).name || "Dragon";
    ctx.fillText("🎉 Great flying, " + nm3 + "! 🎉", W / 2, H * 0.38 + 56);
    ctx.restore();
  }

  // ---------- Loop ----------
  // We drive the game with requestAnimationFrame for smoothness, but ALSO keep
  // a timer-based watchdog: some browsers/tabs throttle or pause rAF, which
  // would freeze the game on a blank frame. The watchdog only advances a frame
  // if rAF hasn't ticked recently, so it never double-steps.
  var lastFrameAt = 0;
  function step(now) {
    if (!lastTime) lastTime = now;
    var dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    lastFrameAt = now;
    if (state === "play") update(dt);
    else if (state === "celebrate") updateCelebrate(dt);
    draw();
  }
  function rafLoop(now) { step(now); requestAnimationFrame(rafLoop); }
  requestAnimationFrame(rafLoop);
  setInterval(function () {
    var now = (window.performance && performance.now) ? performance.now() : Date.now();
    if (now - lastFrameAt > 60) step(now);
  }, 33);

  // ---------- Screen flow ----------
  var startScreen = document.getElementById("startScreen");
  var overScreen = document.getElementById("overScreen");

  function startGame() {
    audio(); // unlock sound on user gesture
    reset();
    state = "play";
    startScreen.classList.add("hidden");
    overScreen.classList.add("hidden");
    lastTime = 0;
    step((window.performance && performance.now) ? performance.now() : Date.now()); // draw first frame now
  }
  function endGame() {
    state = "over";
    if (score > best) { best = score; try { localStorage.setItem("dragonBest", String(best)); } catch (e) {} }
    document.getElementById("finalScore").textContent = score;
    document.getElementById("bestScore").textContent = best;
    overScreen.classList.remove("hidden");
  }

  document.getElementById("startBtn").addEventListener("click", startGame);
  document.getElementById("againBtn").addEventListener("click", startGame);
  document.getElementById("continueBtn").addEventListener("click", nextLevel);
  var readBtn = document.getElementById("readBtn");
  readBtn.addEventListener("click", playFact);

  // ---------- Dragon picker ----------
  var pickEls = document.querySelectorAll(".pick");
  function highlightPick() {
    for (var i = 0; i < pickEls.length; i++) {
      pickEls[i].classList.toggle("sel", pickEls[i].getAttribute("data-dragon") === chosen);
    }
  }
  for (var i = 0; i < pickEls.length; i++) {
    pickEls[i].addEventListener("click", function () {
      var c = this.getAttribute("data-dragon");
      if (DRAGONS[c]) {
        chosen = c;
        try { localStorage.setItem("dragonColor", chosen); } catch (e) {}
        highlightPick();
        beep(880, 0.1, "triangle", 0.08);
      }
    });
  }
  highlightPick();

})();
</script>
</body>
</html>
